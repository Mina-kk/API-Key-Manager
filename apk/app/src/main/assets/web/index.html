<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>API Key Manager</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="Mina.ico" type="image/x-icon">
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
</head>
<body class="dark-theme">
    <div class="app-bar" id="appBar">
        <div class="app-bar-left">
            <div class="logo">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 2l-2 2m-7.61 7.61a5.5 5.5 0 11-7.778 7.778 5.5 5.5 0 017.777-7.777zm0 0L15.5 7.5m0 0l3 3L22 7l-3-3m-3.5 3.5L19 4"/></svg>
                <span>API Key Manager</span>
            </div>
        </div>
        <div class="app-bar-center">
            <div class="search-box">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
                <input type="text" placeholder="搜索..." id="globalSearch" oninput="renderCards()">
            </div>
        </div>
        <div class="app-bar-right">
            <button class="icon-btn" onclick="toggleTheme()" title="切换主题">
                <svg class="moon-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/></svg>
                <svg class="sun-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:none"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
            </button>
        </div>
    </div>

    <div class="main-content" id="mainContent">
        <div class="stats-bar">
            <div class="stat-chip"><span class="stat-chip-value" id="totalCount">0</span><span class="stat-chip-label">总数</span></div>
            <div class="stat-chip"><span class="stat-chip-value" id="modelCount">0</span><span class="stat-chip-label">模型</span></div>
        </div>
        <div class="cards-grid" id="cardsGrid">
            <div class="empty-state" id="emptyState">
                <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M21 2l-2 2m-7.61 7.61a5.5 5.5 0 11-7.778 7.778 5.5 5.5 0 017.777-7.777zm0 0L15.5 7.5m0 0l3 3L22 7l-3-3m-3.5 3.5L19 4"/></svg>
                <p>暂无 API Key</p>
                <span>点击下方按钮添加</span>
            </div>
        </div>
    </div>

    <button class="fab" id="fabAdd" onclick="showAddDialog()" title="新增 API Key">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
    </button>

    <div class="toast-container" id="toastContainer"></div>

    <div class="modal-overlay" id="modalOverlay">
        <div class="modal" id="mainModal">
            <div class="modal-header">
                <h3 id="modalTitle">新增 API Key</h3>
                <button class="modal-close" onclick="hideModal()"><svg width="18" height="18" viewBox="0 0 24 24" stroke="currentColor" stroke-width="3"><line x1="4" y1="4" x2="20" y2="20"/><line x1="20" y1="4" x2="4" y2="20"/></svg></button>
            </div>
            <div class="modal-body" id="modalBody">
                <div class="form-group">
                    <label>快速选择预设</label>
                    <select class="form-input" id="presetSelect" onchange="applyPreset()">
                        <option value="">-- 选择预设 --</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>显示名称 <span class="required">*</span></label>
                    <input type="text" class="form-input" id="editName" placeholder="例如: OpenAI、Azure GPT">
                </div>
                <div class="form-group">
                    <label>基础 URL <span class="required">*</span></label>
                    <input type="url" class="form-input" id="editBaseUrl" placeholder="https://api.openai.com">
                </div>
                <div class="form-group">
                    <label>API 密钥 <span class="required">*</span></label>
                    <div class="input-with-btn">
                        <input type="password" class="form-input" id="editApiKey" style="flex:1">
                        <button class="btn btn-sm" onclick="toggleKeyVisibility('editApiKey', this)" title="显示/隐藏">显示</button>
                    </div>
                </div>
                <div class="form-group">
                    <label>模型列表</label>
                    <div class="models-tags-edit" id="modelsTagsEdit"></div>
                    <div class="input-with-btn" style="margin-top:6px">
                        <input type="text" class="form-input" id="editModelInput" placeholder="输入后按 Enter 添加" style="flex:1">
                        <button class="btn btn-sm" onclick="addEditModel()">添加</button>
                    </div>
                </div>
                <div class="form-group">
                    <button class="btn btn-outline btn-sm" onclick="testAndImportModels()" id="testModelsBtn">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="23,4 23,10 17,10"/><polyline points="1,20 1,14 7,14"/><path d="M3.51 9a9 9 0 0114.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0020.49 15"/></svg>
                        测试连接并导入模型
                    </button>
                    <span id="testResult" class="test-result"></span>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn" onclick="hideModal()">取消</button>
                <button class="btn btn-primary" onclick="saveEntry()" id="saveBtn">保存</button>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="logModalOverlay">
        <div class="modal modal-lg" id="logModal">
            <div class="modal-header">
                <h3 id="logModalTitle">操作日志</h3>
                <button class="modal-close" onclick="hideLogModal()"><svg width="18" height="18" viewBox="0 0 24 24" stroke="currentColor" stroke-width="3"><line x1="4" y1="4" x2="20" y2="20"/><line x1="20" y1="4" x2="4" y2="20"/></svg></button>
            </div>
            <div class="modal-body">
                <div class="log-actions">
                    <button class="btn btn-sm" onclick="addLogEntry()">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                        新增日志
                    </button>
                    <button class="btn btn-sm btn-danger" onclick="clearLogs()">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3,6 5,6 21,6"/><path d="M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2"/></svg>
                        清空日志
                    </button>
                </div>
                <div class="log-list" id="logList">
                    <div class="empty-state small">暂无日志</div>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn" onclick="hideLogModal()">关闭</button>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="addLogModalOverlay">
        <div class="modal" id="addLogModal">
            <div class="modal-header">
                <h3>新增日志条目</h3>
                <button class="modal-close" onclick="hideAddLogModal()"><svg width="18" height="18" viewBox="0 0 24 24" stroke="currentColor" stroke-width="3"><line x1="4" y1="4" x2="20" y2="20"/><line x1="20" y1="4" x2="4" y2="20"/></svg></button>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label>日志内容</label>
                    <textarea class="form-textarea" id="logContentInput" rows="4" placeholder="输入日志内容..."></textarea>
                </div>
                <div class="form-group">
                    <label>状态</label>
                    <select class="form-input" id="logStatusInput">
                        <option value="info">信息</option>
                        <option value="success">成功</option>
                        <option value="warning">警告</option>
                        <option value="error">错误</option>
                    </select>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn" onclick="hideAddLogModal()">取消</button>
                <button class="btn btn-primary" onclick="confirmAddLog()">保存</button>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="testChatModalOverlay">
        <div class="modal" id="testChatModal">
            <div class="modal-header">
                <h3>模型对话测试</h3>
                <button class="modal-close" onclick="hideTestChatModal()"><svg width="18" height="18" viewBox="0 0 24 24" stroke="currentColor" stroke-width="3"><line x1="4" y1="4" x2="20" y2="20"/><line x1="20" y1="4" x2="4" y2="20"/></svg></button>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label>选择模型</label>
                    <select class="form-input" id="testModelSelect"></select>
                </div>
                <div class="form-group">
                    <label>测试提示词</label>
                    <textarea class="form-textarea" id="testPromptInput" rows="3" placeholder="输入测试提示词...">用中文回复：Hello, who are you?</textarea>
                </div>
                <button class="btn btn-primary" onclick="runModelTest()" id="runTestBtn">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="23,4 23,10 17,10"/><polyline points="1,20 1,14 7,14"/><path d="M3.51 9a9 9 0 0114.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0020.49 15"/></svg>
                    发送测试
                </button>
                <div class="form-group" style="margin-top:12px">
                    <label>测试结果</label>
                    <div class="test-chat-result" id="testChatResult">
                        <div class="empty-state small" style="padding:20px">点击"发送测试"开始</div>
                    </div>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn" onclick="hideTestChatModal()">关闭</button>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js').catch(function() {});
        }
    </script>
</body>
</html>
